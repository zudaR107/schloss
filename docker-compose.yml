# One-time setup, before first `docker compose up`:
#   docker network create schloss-net
# schlussel runs from its own repo (see schlussel/docker-compose.yml) and
# must be on the same network for schloss to reach it by hostname.
#
# Does not publish a host port - reached through the tor gateway (see
# https://github.com/zudaR107/tor), which is the only container that
# binds to a host port.
services:
  schloss:
    build:
      context: .
      args:
        VITE_KUVERT_URL: ${KUVERT_URL:-https://kuvert.localhost}
        VITE_SCHLUSSEL_URL: ${SCHLUSSEL_WEB_URL:-https://auth.localhost}
    restart: unless-stopped
    networks:
      - schloss-net

networks:
  schloss-net:
    external: true
