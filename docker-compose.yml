# One-time setup, before first `docker compose up`:
#   docker network create schloss-net
# schlussel runs from its own repo (see schlussel/docker-compose.yml) and
# must be on the same network for schloss to reach it by hostname.
services:
  schloss:
    build:
      context: .
      args:
        VITE_KUVERT_URL: ${KUVERT_URL:-http://localhost:5174}
        VITE_SCHLUSSEL_URL: ${SCHLUSSEL_WEB_URL:-http://localhost:4001}
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - schloss-net

networks:
  schloss-net:
    external: true
