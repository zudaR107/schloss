name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # schloss-ui is a git submodule - needs to be checked out so it's
      # present in the build context the Dockerfile COPYs from.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # ghcr.io requires lowercase; github.repository_owner preserves
          # the account's display case (zudaR107), so it's hardcoded here
          # rather than templated.
          tags: |
            ghcr.io/zudar107/schloss:latest
            ghcr.io/zudar107/schloss:${{ github.sha }}
