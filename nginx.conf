server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # More specific than /auth/ below, so nginx's longest-prefix-match picks
    # this first: /auth/callback is a client-side SPA route (schlussel
    # redirects the browser back here with a token), not an API call.
    location /auth/callback {
        try_files $uri /index.html;
    }

    location /auth/ {
        proxy_pass http://schlussel:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
